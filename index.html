<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 홍보추진계획 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --border: #e5e3dc; --border-mid: #ccc9bf;
    --text: #1a1a18; --text-muted: #6b6960; --text-hint: #9e9b93;
    --accent-purple: #7F77DD; --accent-teal: #1D9E75; --accent-coral: #D85A30;
    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
  .logo span { color: var(--accent-teal); }
  .tab-bar { display: flex; height: 56px; margin-left: 20px; }
  .tab { padding: 0 18px; font-size: 13px; font-weight: 400; color: var(--text-muted); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; height: 56px; font-family: inherit; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); font-weight: 500; border-bottom-color: var(--text); }

  main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }
  .view { display: none; } .view.on { display: block; }
  .page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; background: var(--surface); padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-label { font-size: 10px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  select { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 12px; font-family: inherit; min-width: 110px; cursor: pointer; outline: none; }
  select:focus { border-color: var(--accent-teal); }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; text-align: center; }
  .stat-card.done { background: #E1F5EE; border-color: #9FE1CB; }
  .stat-num { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; }
  .stat-card.done .stat-num { color: #085041; }
  .stat-card.done .stat-lbl { color: #0F6E56; }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-done { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); margin-left: auto; }
  .legend-done-box { width: 14px; height: 14px; border-radius: 3px; background: #E1F5EE; border: 1px solid #9FE1CB; flex-shrink: 0; }

  .month-section { margin-bottom: 28px; }
  .month-header { display: flex; align-items: center; gap: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .month-label { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .month-count { font-size: 11px; color: var(--text-hint); background: var(--bg); border: 1px solid var(--border); padding: 1px 8px; border-radius: 20px; }
  .month-done-count { font-size: 11px; color: #085041; background: #E1F5EE; border: 1px solid #9FE1CB; padding: 1px 8px; border-radius: 20px; }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 10px; }

  .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 13px 15px; border-left: 3px solid var(--border-mid); transition: box-shadow 0.15s, background 0.2s, border-color 0.2s; position: relative; }
  .item-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .item-card.team-대외정책팀 { border-left-color: var(--accent-purple); }
  .item-card.team-지역교류팀 { border-left-color: var(--accent-teal); }
  .item-card.team-지역상생팀 { border-left-color: var(--accent-coral); }

  .item-card.completed { background: #f0faf6; border-color: #9FE1CB; }
  .item-card.completed.team-대외정책팀 { border-left-color: #AFA9EC; }
  .item-card.completed.team-지역교류팀 { border-left-color: #5DCAA5; }
  .item-card.completed.team-지역상생팀 { border-left-color: #F0997B; }
  .item-card.completed .project-name { color: var(--text-muted); }
  .item-card.completed .card-content { color: var(--text-hint); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 7px; }
  .card-top-left { display: flex; align-items: flex-start; gap: 8px; flex: 1; min-width: 0; }
  .project-name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }

  .done-btn { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-mid); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
  .done-btn:hover { border-color: var(--accent-teal); background: #E1F5EE; }
  .done-btn.on { background: var(--accent-teal); border-color: var(--accent-teal); }
  .done-btn.on::after { content: ''; display: block; width: 5px; height: 8px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); }
  .done-label { font-size: 10px; color: #085041; background: #E1F5EE; padding: 1px 7px; border-radius: 10px; font-weight: 500; border: 1px solid #9FE1CB; white-space: nowrap; }

  .fmt-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
  .fmt-숏폼   { background: #EEEDFE; color: #3C3489; }
  .fmt-카드뉴스 { background: #E1F5EE; color: #085041; }
  .fmt-게시글  { background: #FAECE7; color: #712B13; }
  .fmt-블로그  { background: #E6F1FB; color: #0C447C; }
  .fmt-영상   { background: #FAEEDA; color: #633806; }
  .fmt-other  { background: #f0ede6; color: #6b6960; }

  .card-content { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
  .card-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .person-info { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text-muted); }
  .avatar { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .av-백경진{background:#EEEDFE;color:#3C3489} .av-심재민{background:#E1F5EE;color:#085041}
  .av-백승윤{background:#E6F1FB;color:#0C447C} .av-이연재{background:#EAF3DE;color:#3B6D11}
  .av-이지예{background:#FAECE7;color:#712B13} .av-김윤선{background:#FAEEDA;color:#633806}
  .av-이예리{background:#FCEBEB;color:#791F1F} .av-default{background:#f0ede6;color:#6b6960}

  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .sns-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border); color: var(--text-hint); }
  .ai-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: #FFF000; color: #5a4c00; font-weight: 600; }

  .empty-state { padding: 40px; text-align: center; color: var(--text-muted); font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); }
  .loading { padding: 60px; text-align: center; color: var(--text-muted); font-size: 13px; }
  .loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-teal); margin: 0 3px; animation: blink 1.2s infinite; }
  .loading-dot:nth-child(2){animation-delay:0.2s} .loading-dot:nth-child(3){animation-delay:0.4s}
  @keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}

  .admin-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .admin-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .admin-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .admin-actions { display: flex; gap: 8px; align-items: center; }
  .btn { font-size: 12px; padding: 7px 14px; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; font-weight: 500; }
  .btn-secondary { border: 1px solid var(--border-mid); background: var(--surface); color: var(--text); }
  .btn-secondary:hover { background: var(--bg); }
  .btn-primary { border: 1px solid #1D9E75; background: #E1F5EE; color: #085041; }
  .btn-primary:hover { opacity: 0.85; }
  .save-msg { font-size: 12px; color: var(--accent-teal); font-weight: 500; }

  .tbl-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); }
  table.edit-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.edit-tbl th { background: var(--bg); color: var(--text-muted); font-weight: 500; padding: 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 11px; }
  table.edit-tbl td { padding: 5px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  table.edit-tbl tr:last-child td { border-bottom: none; }
  table.edit-tbl tr:hover td { background: #faf9f6; }
  table.edit-tbl input[type=text], table.edit-tbl select { padding: 5px 8px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); color: var(--text); font-size: 12px; font-family: inherit; width: 100%; outline: none; }
  table.edit-tbl input[type=text]:focus, table.edit-tbl select:focus { border-color: var(--accent-teal); }
  table.edit-tbl input[type=checkbox] { width: auto; margin: 0 2px; cursor: pointer; }
  .btn-del { padding: 3px 8px; font-size: 11px; border: 1px solid #f09595; border-radius: 5px; background: transparent; color: #A32D2D; cursor: pointer; font-family: inherit; }
  .btn-del:hover { background: #FCEBEB; }

  .pw-overlay { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px; max-width: 360px; margin: 60px auto; text-align: center; }
  .pw-overlay h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .pw-overlay p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .pw-row { display: flex; gap: 8px; justify-content: center; }
  .pw-row input { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; outline: none; width: 180px; }
  .pw-row input:focus { border-color: var(--accent-teal); }
  .pw-err { font-size: 12px; color: #A32D2D; margin-top: 10px; min-height: 18px; }
  #syncStatus { font-size: 11px; color: var(--text-hint); }

  @media (max-width: 600px) { header { padding: 0 16px; } main { padding: 20px 14px 40px; } }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <div class="logo">대외협력과 <span>홍보계획</span></div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('main',this)">대시보드</button>
      <button class="tab" onclick="switchTab('admin',this)">관리자 편집</button>
    </div>
  </div>
  <div id="syncStatus"></div>
</header>

<main>
  <div class="view on" id="view-main">
    <div class="page-title">2026 홍보추진계획 대시보드</div>
    <div class="page-sub">대외협력과 사업별 온라인 홍보</div>
    <div class="filter-row">
      <div class="filter-group"><div class="filter-label">담당자</div><select id="personFilter"><option value="">전체 담당자</option></select></div>
      <div class="filter-group"><div class="filter-label">팀</div>
        <select id="teamFilter"><option value="">전체 팀</option><option>대외정책팀</option><option>지역교류팀</option><option>지역상생팀</option></select>
      </div>
      <div class="filter-group"><div class="filter-label">월</div>
        <select id="monthFilter"><option value="">전체 월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option></select>
      </div>
      <div class="filter-group"><div class="filter-label">추진방식</div>
        <select id="formatFilter"><option value="">전체</option><option>숏폼</option><option>카드뉴스</option><option>게시글</option><option>블로그</option><option>영상</option></select>
      </div>
      <div class="filter-group"><div class="filter-label">완료여부</div>
        <select id="doneFilter"><option value="">전체</option><option value="done">완료</option><option value="todo">미완료</option></select>
      </div>
    </div>
    <div class="stats" id="statsRow"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-purple)"></div>대외정책팀</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-teal)"></div>지역교류팀</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-coral)"></div>지역상생팀</div>
      <div class="legend-done"><div class="legend-done-box"></div>게시완료 카드</div>
    </div>
    <div id="mainContent"><div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div></div>
  </div>

  <div class="view" id="view-admin">
    <div id="pwScreen">
      <div class="pw-overlay">
        <h2>관리자 전용</h2>
        <p>데이터를 수정하려면 비밀번호를 입력하세요</p>
        <div class="pw-row">
          <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()">
          <button class="btn btn-primary" onclick="checkPw()">확인</button>
        </div>
        <div class="pw-err" id="pwErr"></div>
      </div>
    </div>
    <div id="editScreen" style="display:none">
      <div class="admin-topbar">
        <div><div class="admin-title">원데이터 편집</div><div class="admin-sub">수정 후 반드시 저장 및 반영을 눌러주세요</div></div>
        <div class="admin-actions">
          <button class="btn btn-secondary" onclick="addRow()">+ 행 추가</button>
          <button class="btn btn-primary" onclick="saveData()">저장 및 반영</button>
          <span class="save-msg" id="saveMsg"></span>
        </div>
      </div>
      <div class="tbl-wrap">
        <table class="edit-tbl">
          <thead><tr>
            <th>월/시기</th><th style="min-width:110px">사업명</th><th style="min-width:220px">내용</th>
            <th style="min-width:90px">추진방식</th><th>팀명</th><th style="min-width:60px">담당자</th>
            <th>유튜브</th><th>인스타</th><th>블로그</th><th>페이스북</th><th>AI</th><th></th>
          </tr></thead>
          <tbody id="editBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

let DATA = [];

function setSync(msg) { document.getElementById("syncStatus").textContent = msg; }

async function loadData() {
  setSync("데이터 불러오는 중...");
  try {
    const snap = await getDoc(DOC_REF);
    if (snap.exists() && snap.data().items) {
      DATA = snap.data().items.map(d => ({...d, done: d.done || false}));
    } else {
      DATA = DEFAULT_DATA;
      await setDoc(DOC_REF, { items: DATA });
    }
    setSync("✓ 최신 데이터");
    setTimeout(() => setSync(""), 3000);
  } catch(e) {
    DATA = DEFAULT_DATA;
    setSync("오프라인 모드");
    console.error(e);
  }
  updatePersonFilter();
  applyRender();
}

async function saveToFirebase() {
  setSync("저장 중...");
  try {
    await setDoc(DOC_REF, { items: DATA });
    setSync("✓ 저장 완료");
    setTimeout(() => setSync(""), 3000);
    return true;
  } catch(e) {
    setSync("저장 실패");
    console.error(e);
    return false;
  }
}

window.switchTab = (id, btn) => {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("on"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("view-" + id).classList.add("on");
  btn.classList.add("active");
};

window.checkPw = () => {
  if (document.getElementById("pwInput").value === PW) {
    document.getElementById("pwScreen").style.display = "none";
    document.getElementById("editScreen").style.display = "block";
    buildEditTable();
  } else {
    document.getElementById("pwErr").textContent = "비밀번호가 올바르지 않습니다";
    document.getElementById("pwInput").value = "";
  }
};

window.toggleDone = async (globalIdx) => {
  DATA[globalIdx].done = !DATA[globalIdx].done;
  await saveToFirebase();
  applyRender();
};

function getMonthKey(m) {
  const n = parseInt(m); if (!isNaN(n)) return n;
  if (m.includes("~")) return parseInt(m.split("~")[0]) || 99;
  if (m === "상반기") return 6.5; if (m === "하반기") return 12.5; return 99;
}
function getFmtClass(f) {
  if (!f) return "fmt-other";
  for (const k of ["숏폼","카드뉴스","게시글","블로그","영상"]) if (f.includes(k)) return "fmt-"+k;
  return "fmt-other";
}
function getAvClass(p) {
  const m = {"백경진":"av-백경진","심재민":"av-심재민","백승윤":"av-백승윤","이연재":"av-이연재","이지예":"av-이지예","김윤선":"av-김윤선","이예리":"av-이예리"};
  return m[p] || "av-default";
}
function updatePersonFilter() {
  const sel = document.getElementById("personFilter"), cur = sel.value;
  const list = [...new Set(DATA.map(d=>d.person).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">전체 담당자</option>' + list.map(p=>`<option ${p===cur?"selected":""}>${p}</option>`).join("");
}

function applyRender() {
  const pf = document.getElementById("personFilter").value;
  const tf = document.getElementById("teamFilter").value;
  const mf = document.getElementById("monthFilter").value;
  const ff = document.getElementById("formatFilter").value;
  const df = document.getElementById("doneFilter").value;

  const totalDone = DATA.filter(d => d.done).length;

  let filtered = DATA.map((d, i) => ({...d, _idx: i})).filter(d => {
    if (pf && d.person !== pf) return false;
    if (tf && d.team !== tf) return false;
    if (mf && !d.month.includes(mf)) return false;
    if (ff && !d.format.includes(ff)) return false;
    if (df === "done" && !d.done) return false;
    if (df === "todo" && d.done) return false;
    return true;
  });

  const filteredDone = filtered.filter(d => d.done).length;

  document.getElementById("statsRow").innerHTML = `
    <div class="stat-card"><div class="stat-num">${filtered.length}</div><div class="stat-lbl">총 콘텐츠 수</div></div>
    <div class="stat-card done"><div class="stat-num">${totalDone}</div><div class="stat-lbl">게시 완료</div></div>
    <div class="stat-card"><div class="stat-num">${filtered.length - filteredDone}</div><div class="stat-lbl">미완료</div></div>
    <div class="stat-card"><div class="stat-num">${[...new Set(filtered.map(d=>d.person))].length}</div><div class="stat-lbl">담당자 수</div></div>
    <div class="stat-card"><div class="stat-num">${filtered.filter(d=>d.ai).length}</div><div class="stat-lbl">AI 활용</div></div>
  `;

  const main = document.getElementById("mainContent");
  if (!filtered.length) { main.innerHTML='<div class="empty-state">조건에 맞는 콘텐츠가 없습니다</div>'; return; }

  const groups = {};
  filtered.forEach(d => { if(!groups[d.month])groups[d.month]=[]; groups[d.month].push(d); });
  const keys = Object.keys(groups).sort((a,b)=>getMonthKey(a)-getMonthKey(b));

  main.innerHTML = keys.map(m => {
    const items = groups[m];
    const doneInMonth = items.filter(d=>d.done).length;
    const label = m.match(/^\d+$/) ? m+"월" : m;
    const doneCountHtml = doneInMonth > 0 ? `<div class="month-done-count">완료 ${doneInMonth}</div>` : "";
    const cards = items.map(d => `
      <div class="item-card team-${d.team}${d.done?" completed":""}">
        <div class="card-top">
          <div class="card-top-left">
            <button class="done-btn${d.done?" on":""}" onclick="toggleDone(${d._idx})" title="게시완료 토글"></button>
            <div class="project-name">${d.project}</div>
          </div>
          <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
            ${d.done ? '<span class="done-label">게시완료</span>' : ""}
            <span class="fmt-badge ${getFmtClass(d.format)}">${d.format}</span>
          </div>
        </div>
        <div class="card-content">${d.content}</div>
        <div class="card-bottom">
          <div class="person-info"><span class="avatar ${getAvClass(d.person)}">${(d.person||"?")[0]}</span><span>${d.person} · ${d.team}</span></div>
          <div class="card-tags">
            ${d.ai?'<span class="ai-tag">AI</span>':""}
            ${(d.sns||[]).map(s=>`<span class="sns-tag">${s}</span>`).join("")}
          </div>
        </div>
      </div>`).join("");
    return `<div class="month-section">
      <div class="month-header">
        <div class="month-label">${label}</div>
        <div class="month-count">${items.length}건</div>
        ${doneCountHtml}
      </div>
      <div class="card-grid">${cards}</div>
    </div>`;
  }).join("");
}

function buildEditTable() {
  const tbody = document.getElementById("editBody"); tbody.innerHTML = "";
  DATA.forEach((d,i) => {
    const tr = document.createElement("tr");
    const snsChecks = SNS_KEYS.map(s=>`<td style="text-align:center"><input type="checkbox" title="${s}" data-sns="${s}" ${(d.sns||[]).includes(s)?"checked":""}></td>`).join("");
    tr.innerHTML = `
      <td><input type="text" value="${d.month}" data-f="month" style="width:65px"></td>
      <td><input type="text" value="${d.project}" data-f="project"></td>
      <td><input type="text" value="${d.content}" data-f="content"></td>
      <td><input type="text" value="${d.format}" data-f="format" style="width:85px"></td>
      <td><select data-f="team" style="width:90px">
        <option ${d.team==="대외정책팀"?"selected":""}>대외정책팀</option>
        <option ${d.team==="지역교류팀"?"selected":""}>지역교류팀</option>
        <option ${d.team==="지역상생팀"?"selected":""}>지역상생팀</option>
      </select></td>
      <td><input type="text" value="${d.person}" data-f="person" style="width:58px"></td>
      ${snsChecks}
      <td style="text-align:center"><input type="checkbox" data-f="ai" ${d.ai?"checked":""}></td>
      <td><button class="btn-del" onclick="delRow(${i})">삭제</button></td>`;
    tbody.appendChild(tr);
  });
}

window.addRow = () => {
  DATA.push({month:"",project:"",content:"",format:"카드뉴스",team:"대외정책팀",person:"",sns:[],ai:false,done:false});
  buildEditTable();
  document.getElementById("editBody").lastElementChild.querySelector("input").focus();
};
window.delRow = i => {
  if (!confirm("이 행을 삭제하시겠습니까?")) return;
  DATA.splice(i,1); buildEditTable();
};
window.saveData = async () => {
  const rows = document.getElementById("editBody").querySelectorAll("tr");
  rows.forEach((tr,i) => {
    const d = DATA[i];
    tr.querySelectorAll("[data-f]").forEach(el => { if(el.dataset.f==="ai") d.ai=el.checked; else d[el.dataset.f]=el.value; });
    d.sns=[]; tr.querySelectorAll("[data-sns]").forEach(cb=>{ if(cb.checked) d.sns.push(cb.dataset.sns); });
  });
  const ok = await saveToFirebase();
  if (ok) {
    updatePersonFilter(); applyRender();
    const msg = document.getElementById("saveMsg");
    msg.textContent = "저장 완료!"; setTimeout(()=>msg.textContent="", 2500);
  }
};

["personFilter","teamFilter","monthFilter","formatFilter","doneFilter"].forEach(id =>
  document.getElementById(id).addEventListener("change", applyRender)
);
loadData();
